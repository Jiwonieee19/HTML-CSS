<!-- Challenge Exercise -- because flexbox daay ni nga lesson, dapat nka div tanan to practice daw -->

<html>
    <head>
        <style>
            div {
                font-family: Arial;
                color: aliceblue;
            }
            .container {
                display: flex;
                flex-direction: row;
                align-items: center;
                background-color: blueviolet;
                justify-content: space-between;
                padding: 10px 20px;
            }
            .home {
                font-weight: bold;
            }
            .search {
                color: blueviolet;
                background-color: aliceblue;
                font-size: small;
                width: 500px;
                padding: 8px 12px;
                border-radius: 30px;
            }
            .download {
                border: solid;
                border-width: 2px;
                padding: 8px 12px;
                border-color: aliceblue;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="home">Home</div>
            <div class="search">Search</div>
            <div class="download">Download</div>
        </div>
    </body>
</html>
