<html>
    <head>
        <style>
            img {
                width: 100px;
                height: 100px;
                border-radius: 50%;
                object-fit: cover;
                object-position: center;
            }
            .container {
                padding: 15px;
                /* background-color: blanchedalmond; */
            }
            .flexbox {
                display: flex;
                flex-direction: row;
                align-items: center;
                gap: 20px;
                margin: 20px;
            }
            .details {
                display: flex;
                flex-direction: column;
                width: 180px;
                margin-right: 80px;
                row-gap: 10px;
            }
            div {
                font-family: Arial;
                color: gray;
            }
            .name {
                font-size: large;
                font-weight: bold;
                color: black;
            }
            .follow {
                color: aliceblue;
                background-color: rgb(0, 102, 255);
                font-size: larger;
                font-weight: bold;
                padding: 10px;
                border-radius: 8px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="flexbox">
                <img src="../lesson-10/shinobu.png" alt="shinobu">
                <div class="details">
                    <div class="name">Shinobu Kocho</div>
                    <div class="who">A Demon Slayer</div>
                    <div class="status">Top 8 Hashira</div>
                </div>
                <div class="follow">Follow</div>
            </div>
            <div class="flexbox">
                <img src="../lesson-10/cat.jpg" alt="cat">
                <div class="details">
                    <div class="name">Meowskie</div>
                    <div class="who">A Mouse Slayer</div>
                    <div class="status">Top 1 Global</div>
                </div>
                <div class="follow">Follow</div>
            </div>
            <div class="flexbox">
                <img src="../lesson-10/cat2.jpg" alt="cat2">
                <div class="details">
                    <div class="name">Queenie</div>
                    <div class="who">A Diva</div>
                    <div class="status">Miss Cat 2029 Winner</div>
                </div>
                <div class="follow">Follow</div>
            </div>
        </div>
    </body>
</html>
