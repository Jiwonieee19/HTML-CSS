<!-- Challenge Exercise -->

<html>
    <head>
        <style>
            .container {
                border: none;
                border-radius: 10px;
                padding: 10px;
                width: 350px;
                box-shadow: 0px 1px 5px gray;
            }
            .flexbox {
                display: flex;
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                padding: 10px 20px;
            }
            .notif {
                padding: 10px 20px;
                color: white;
                background-color: rgb(0, 85, 255);
                border: none;
                border-radius: 25px;
            }
            div {
                font-family: Arial;
                font-size: larger;
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="flexbox">
                <div>Home</div>
                <div class="notif">14</div>
            </div>
            <div class="flexbox">
                <div>Notifications</div>
                <div class="notif">3</div>
            </div>
            <div class="flexbox">
                <div>Messages</div>
                <div class="notif">1</div>
            </div>
        </div>
    </body>
</html>
