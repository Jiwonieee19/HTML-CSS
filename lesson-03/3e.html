<style>

    .apply-button {
        color: white;
        background-color: rgb(10, 102, 194);
        width: 280px;
        padding: 10px 0px;
        border: none;
        border-radius: 20px;
        font-weight: bold;
        font-size: large;
        cursor: pointer;
        margin: 0px 10px;
    }

    .apply-button:hover {
        background-color: rgb(11, 66, 120);
        transition: ease-in-out;
        transition-duration: .5s;
    }

    .save-button {
        color: rgb(10, 102, 194);
        background-color: transparent;
        width: 80px;
        padding: 10px 0px;
        border: solid;
        border-width: 1.8px;
        border-radius: 20px;
        font-weight: bold;
        font-size: large;
        cursor: pointer;
        /* proper transition */
        transition: background-color 0.2s,
                    border-width 0.2s;
    }

    .save-button:hover {
        background-color: rgba(10, 102, 194, 0.3);
        border-width: 2px;
    }
</style>

<button class="apply-button">Apply on company website</button>
<button class="save-button">Save</button>
