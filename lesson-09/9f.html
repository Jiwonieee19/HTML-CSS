<!-- Challenge Exercise -- fb people you may know -->

<html>
    <head>
        <style>
            div {
                width: 200px;
                height: 325px;
                box-shadow: 0px 1px 5px gray;
            }
            img {
                width: 200px;
                height: 200px;
                object-fit: cover;
                object-position: center;
                margin-bottom: 8px;
            }
            p {
                font-family: Arial;
            }
            .p-name {
                font-size: larger;
                font-weight: bold;
                margin: 8px;
            }
            .p-mutual {
                color: gray;
                margin: 8px;
            }
            button {
                color: white;
                background-color: rgb(32, 102, 252);
                padding: 10px 15px;
                border: none;
                border-radius: 5px;
                margin: 8px;
            }
        </style>
    </head>
    <body>
        <div>
                <img src="shinobu.png" alt="shinobu-pic">
                <p class="p-name">Shinobu Kocho</p>
                <p class="p-mutual">5 mutual friends</p>
                <button>Add Friend</button>
        </div>
    </body>
</html>
