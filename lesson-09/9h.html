<html>
    <head>
        <style>
            div {
                display: flex;
                flex-direction: column;
                /* text-align: center; */
                align-items: center;
                gap: 20px;
            }
            img {
                width: 272px;
                object-fit: cover;
                object-position: center;
            }
            input {
                width: 400px;
                color: gray;
                font-family: Arial;
                font-size: large;
                padding: 10px;
                border: none;
                border-radius: 20px;
                box-shadow: 0px 1px 5px gray;
            }
            .div-button {
                display: inline-block;
            }
            button {
                padding: 10px 15px;
                border: none;
                margin: 10px;
            }
        </style>
    </head>
    <body>
        <div>
            <img src="google-logo.png" alt="google-logo-pic">
            <input type="text" name="" id="" placeholder="Search Google or type a URL">
            <div class="div-button">
                <button>Google Search</button>
                <button>I'm Feeling Lucky</button>
            </div>
        </div>
    </body>
</html>
