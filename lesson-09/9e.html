<html>
    <head>
        <style>
            div {
                width: 340px;
                padding: 10px;
                box-shadow: 0px 1px 5px gray;
                display: flex;
                flex-direction: row;
                gap: 10px;
                align-items: center;
            }
            img {
                width: 50px;
                height: 50px;
                border-radius: 50%;
                object-fit: cover;
                object-position: center;
                /* vertical-align: middle; */
            }
            input {
                color: gray;
                width: 200px;
                height: 40px;
                font-size: large;
                border: none;
                /* vertical-align: middle; */
            }
            button {
                color: white;
                background-color: rgb(0, 140, 255);
                font-weight: bold;
                padding: 10px 15px;
                border: none;
                border-radius: 25px;
                /* vertical-align: middle; */
            }
        </style>
    </head>
    <body>
        <div>
            <img src="shinobu.png" alt="shinobu-pic">
            <input type="text" name="" id="" placeholder="What's happening?">
            <button>Tweet</button>
        </div>
    </body>
</html>
