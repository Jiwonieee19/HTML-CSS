<html>
    <head>
        <style>
            div {
                font-family: Arial;
                color: gray;
            }
            .container {
                width: 440px;
                padding: 10px;
                border: none;
                border-radius: 5px;
                box-shadow: 0px 1px 5px gray;
            }
            .header {
                margin-bottom: 10px;
            }
            .flexbox-1 {
                display: flex;
                flex-direction: row;
                align-items: center;
                margin: 20px 10px;
                gap: 10px
            }
            img {
                width: 70px;
                height: 70px;
                border-radius: 50%;
                object-fit: cover;
                object-position: center;
            }
            .column {
                display: block;
            }
            .flexbox-2 {
                display: flex;
                flex-direction: row;
                align-items: center;
                width: 340px;
                justify-content: space-between;
            }
            .subject {
                font-size: large;
                font-weight: bolder;
                color: black;
            }
            .secondary-title {
                color: black;
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">ALL INBOXES</div>
            <div class="flexbox-1">
                <img src="../lesson-10/shinobu.png" alt="shinobu">
                <div class="column">
                    <div class="flexbox-2">
                        <div class="subject">Chewy Promotions</div>
                        <div class="time">4:58 PM</div>
                    </div>
                    <div class="secondary-title">Biggest Sale of the Year!</div>
                    <div class="details">Hey there! We're writing to tell you our..</div>
                </div>
            </div>
            <div class="flexbox-1">
                <img src="../lesson-10/cat.jpg" alt="cat">
                <div class="column">
                    <div class="flexbox-2">
                        <div class="subject">Best Buy</div>
                        <div class="time">12:32 PM</div>
                    </div>
                    <div class="secondary-title">Your Best Buy eReceipt!</div>
                    <div class="details">Thankyou! for shopping at Best Buy, here is..</div>
                </div>
            </div>
            <div class="flexbox-1">
                <img src="../lesson-10/cat2.jpg" alt="cat2">
                <div class="column">
                    <div class="flexbox-2">
                        <div class="subject">Netflix</div>
                        <div class="time">9:00 AM</div>
                    </div>
                    <div class="secondary-title">Here's what's coming soon to Netflix</div>
                    <div class="details">Brand new movies and shows, old favorites..</div>
                </div>
            </div>
        </div>
    </body>
</html>
