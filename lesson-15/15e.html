<!-- Challenge Exercise -->

<html>
    <head>
        <style>
            p {
                font-family: Arial;
                margin: 0px;
                padding: 0px;
            }
            .card {
                position: relative;
                display: inline-block;
            }
            .sale {
                position: absolute;
                top: 8px;
                right: 0px;
                background-color: rgb(254, 107, 107);
                padding: 5px;
            }
            img {
                width: 400px;
                height: 400px;
                object-fit: cover;
                object-position: center;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <img src="sweater.png" alt="sweater">
            <div class="sale">
                <p>20% OFF</p>
            </div>
        </div>
    </body>
</html>
