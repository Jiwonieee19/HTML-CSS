<html>
    <head>
        <style>
            body {
                height: 3000px;
            }
            div {
                width: 320px;
                height: 180px;
                background-color: gray;
                position: fixed;
                right: 10px;
                bottom: 10px;
            }
            .circle {
                width: 35px;
                height: 35px;
                background-color: black;
                display: flex;
                align-items: center;
                justify-content: center;
                position: absolute;
                top: -10px;
                left: -10px;
                border-radius: 50%;
            }
            p {
                color: white;
            }
            .timestamp {
                width: 30px;
                height: 15px;
                color: white;
                background-color: rgb(39, 39, 39);
                display: flex;
                align-items: center;
                justify-content: center;
                position: absolute;
                bottom: 8px;
                right: 8px;
                padding: 5px;
            }
        </style>
    </head>
    <body>
        <div>
            <div class="circle">
                <p>X</p>
            </div>
            <div class="timestamp">0:29</div>
        </div>
    </body>
</html>
