<!-- signup form -->

<html>
    <head>
        <style>
            input {
                font-size: large;
                height: 40px;
                padding: 10px;
                border: solid;
                border-radius: 5px;
                border-color: gray;
                border-width: 1px;
                margin: 5px;
            }
            .input-name {
                width: 193px;
                display: inline-block;
            }
            .input-email {
                width: 400px;
                display: block;
            }
            button {
                font-size: large;
                font-weight: bold;
                color: white;
                background-color: blue;
                width: 400px;
                padding: 10px;
                border: none;
                border-radius: 5px;
                margin: 5px;
            }
        </style>
    </head>
    <body>
        <input class="input-name" type="text" name="" id="" placeholder="First Name">
        <input class="input-name" type="text" name="" id="" placeholder="Last Name">
        <input class="input-email" type="text" name="" id="" placeholder="Email">
        <button>Sign Up</button>
    </body>
</html>
