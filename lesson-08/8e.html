<!-- Challenge Exercise -- uber request-a-ride form -->

<html>
    <head>
        <style>
            p {
                font-family: Arial;
                font-size: xx-large;
                margin: 20px 5px;
            }
            input {
                color: rgb(81, 80, 80);
                background-color: rgb(223, 223, 223);
                width: 350px;
                padding: 10px;
                margin: 5px;
                border: none;
                display: block;
            }
            button {
                width: 150px;
                height: 40px;
                padding: 10px;
                border: none;
                margin: 15px 5px;
            }
            .button-req {
                color: White;
                background-color: black;
            }
            .button-sched {
                color: black;
                background-color: rgb(223, 223, 223);
            }
        </style>
    </head>
    <body>
        <p>Request a Ride Now</p>
        <input type="text" name="" id="" placeholder="Enter pickup location">
        <input type="text" name="" id="" placeholder="Enter destination">
        <button class="button-req">Request Now</button>
        <button class="button-sched">Schedule for later</button>
    </body>
</html>
