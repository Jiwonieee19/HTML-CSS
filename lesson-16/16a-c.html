<html>
    <head>
        <style>
            div {
                font-family: Arial, Helvetica, sans-serif;
            }
            .container {
                display: block;
                padding: 10px;
                /* background-color: aqua; */
            }
            .vid {
                position: relative;
                width: 400px;
                height: 250px;
            }
            .img-thumbnail {
                width: 400px;
                height: 250px;
                object-fit: cover;
                object-position: center;
            }
            .timestamp {
                color: white;
                background-color: black;
                position: absolute;
                bottom: 8px;
                right: 8px;
                padding: 5px;
            }
            .flexbox-1 {
                display: flex;
                flex-direction: row;
                align-items: center;
                margin: 10px 0px;
            }
            .img-prof {
                width: 50px;
                height: 50px;
                border-radius: 50%;
                margin-right: 10px;
            }
            .title {
                font-weight: bold;
                font-size: large;
            }
            a {
                text-decoration: none;
                color: black;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="vid">
                <!-- 16c -->
                <a href="https://github.com/Jiwonieee19/HTML-CSS" target="_blank">
                    <img src="../lesson-10/shinobu.png" alt="shinobu" class="img-thumbnail">
                </a>
                <div class="timestamp">14:20</div>
            </div>
            <div class="flexbox-1">
                <img src="../lesson-10/cat.jpg" alt="cat" class="img-prof">
                <!-- 16b -->
                <a href="https://github.com/SuperSimpleDev/html-css-course/tree/main/1-exercise-solutions/lesson-16" target="_blank">
                    <div class="title">Talking to Shinobu like you know her!</div>
                </a>
            </div>
        </div>
    </body>
</html>
